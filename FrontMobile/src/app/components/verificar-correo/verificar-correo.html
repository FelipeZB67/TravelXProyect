<div class="verify-wrapper">
  <div class="verify-card">
    <div class="verify-icon">
      <i class="fas fa-envelope-open-text"></i>
    </div>
    <h1 class="verify-title">Verifica tu correo</h1>
    <p class="verify-subtitle">
      Enviamos un código a <strong>{{ correo }}</strong>. Ingrésalo aquí para activar tu cuenta.
    </p>

    @if (error) {
      <div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    }
    @if (exito) {
      <div class="alert alert-exito"><i class="fas fa-check-circle"></i> {{ exito }}</div>
    }

    <div class="form-group">
      <label>Código de verificación</label>
      <input class="form-input" type="text" [(ngModel)]="codigo"
             placeholder="Ej: 482910" maxlength="6">
    </div>

    <button class="btn-verificar" (click)="verificar()" [disabled]="cargando">
      @if (cargando) { <i class="fas fa-spinner fa-spin"></i> Verificando... }
      @else { <i class="fas fa-check"></i> Verificar cuenta }
    </button>

    <p class="back-link" (click)="router.navigate(['/login'])">
      <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
    </p>
  </div>
</div>
